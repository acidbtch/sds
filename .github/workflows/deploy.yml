name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets
        run: |
          test -n "${{ secrets.TS_OAUTH_CLIENT_ID }}" && echo "TS_OAUTH_CLIENT_ID ok" || (echo "TS_OAUTH_CLIENT_ID missing" && exit 1)
          test -n "${{ secrets.TS_OAUTH_SECRET }}" && echo "TS_OAUTH_SECRET ok" || (echo "TS_OAUTH_SECRET missing" && exit 1)

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /regiuslab/sds-miniapp/sds-frontend
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
